<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MRW | Signup</title>
  <link rel="stylesheet" href="/css/Style.css">
</head>
<body class="page-signup">
  <div class="page-shell">
    <main class="content-stack">
      <section class="form-layout">
        <div class="form-card">
          <h2>Sign Up</h2>

          <form id="signupForm" class="stack-form">
            <input type="text" name="username" placeholder="Username" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button class="button primary signup-button" type="submit">Register</button>
          </form>

          <a class="form-link" href="/login.html">Back to login</a>
          <p class="status-text" id="signupStatus"></p>
        </div>
      </section>
    </main>
  </div>

  <script src="/js/script.js"></script>
</body>
</html>
