<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MRW | Login</title>
  <link rel="stylesheet" href="/css/Style.css">
</head>
<body class="page-login">
  <div class="page-shell">
    <main class="content-stack">
      <section class="form-layout">
        <div class="form-card">
          <h2>Login</h2>

          <form id="loginForm" class="stack-form">
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button class="button primary login-button" type="submit">Login</button>
          </form>

          <a class="form-link" href="/home.html">Go to Home</a>
          <p class="status-text" id="loginStatus"></p>
        </div>
      </section>
    </main>
  </div>

  <script src="/js/script.js"></script>
</body>
</html>
