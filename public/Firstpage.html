<!DOCTYPE html>
<html>
<head>
<title>Movie Review Rating</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:url('https://images.unsplash.com/photo-1524985069026-dd778a71c7b4') no-repeat center/cover;
    color:white;
    height:100vh;
}

/* Top Right Navigation */
.nav{
    position:absolute;
    top:20px;
    right:40px;
}

.nav a{
    color:white;
    text-decoration:none;
    margin-left:20px;
    font-weight:bold;
    background:rgba(0,0,0,0.7);
    padding:8px 15px;
    border-radius:6px;
}

.nav a:hover{
    background:crimson;
}

/* Center Title */
.title{
    text-align:center;
    margin-top:80px;
    font-size:45px;
    font-weight:bold;
    text-shadow:2px 2px 8px black;
}

/* Movie Section */
.movies{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    margin-top:50px;
    gap:30px;
}

.movie-box{
    background:rgba(0,0,0,0.8);
    padding:20px;
    width:220px;
    text-align:center;
    border-radius:10px;
}

.movie-box h3{
    margin-bottom:15px;
}

.stars{
    cursor:pointer;
    font-size:20px;
    color:gold;
}
.p
{
    font-size: medium;
}
</style>
</head>

<body>

<div class="nav">
   
    <a href="login.html">Login</a>
    <a href="webpage.html">Sign In</a>
</div>

<div class="title">
<H3>Welcome to Movie Review Rating</H3>
<ul class="p" type="circle">
    <li>Discover and share your thoughts on the latest movies.</li>
    <li>Rate your favorites and see what others think!</li>
</ul>
</div>
<script>
function goHome(){
    window.location.href="home.html";
}
</script>
<script>
function changeBg(movie){
    if(movie=="avengers"){
        document.body.style.backgroundImage="url('https://images.unsplash.com/photo-1608889825271-9696287f6b37')";
    }
    else if(movie=="batman"){
        document.body.style.backgroundImage="url('https://images.unsplash.com/photo-1605647540924-852290f3a0a6')";
    }
    else if(movie=="spiderman"){
        document.body.style.backgroundImage="url('https://images.unsplash.com/photo-1626814026160-2237a95fc5a0')";
    }
    else{
        document.body.style.backgroundImage="url('https://images.unsplash.com/photo-1509347528160-9a9e33742cdb')";
    }
}
</script>

</body>
</html>
